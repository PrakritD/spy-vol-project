walk_forward:
  initial_train_months: 12
  refit_freq_months: 1
  expanding: true

execution:
  instrument: VXX
  fill: next_open
  cost_bps_per_side: 5
  slippage_bps_on_flip: 1

# Feature groups -- referenced by each model spec's `feature_groups:` list.
# These resolve to actual panel column names in the runner via `feature_groups`.
feature_groups:
  vix:
    - vix_level_lag1
    - vix_log_lag1
    - vix_chg_1d_lag1
    - vix_chg_5d_lag1
    - vix_zscore_lag1
    - term_9d_30d_lag1
    - term_30d_90d_lag1
    - vvix_vix_lag1
  gex:
    - gex_net_lag1
    - gex_calls_lag1
    - gex_puts_lag1
    - n_contracts_lag1
  # HAR-X needs auxiliary columns (rv triple + the regression target rv_next).
  # The model's predict_proba drops rv_next at inference time; see models/har_x.py.
  har_aux:
    - rv
    - rv_5d_mean
    - rv_rolling_mean
    - rv_next

# Pre-registered model specs. Hyperparams locked by literature/theory priors
# BEFORE any CV run -- do not retune based on results.
models:
  - name: logistic_vix_only
    type: logistic
    feature_groups: [vix]
    hyperparams: {C: 1.0}

  - name: logistic_interactions
    type: logistic_interactions
    feature_groups: [vix, gex]
    hyperparams: {C: 1.0}

  - name: har_x
    type: har_x
    feature_groups: [vix, gex, har_aux]
    hyperparams: {use_gex: true}

  - name: xgb_full
    type: xgb_calibrated
    feature_groups: [vix, gex]
    hyperparams:
      n_estimators: 200
      max_depth: 4
      learning_rate: 0.05

  - name: mlp_small
    type: mlp_small
    feature_groups: [vix, gex]
    hyperparams:
      hidden_sizes: [16, 16]
      alpha: 1.0e-3
      max_iter: 500

  - name: bayesian_head
    type: bayesian_head
    feature_groups: [vix, gex]
    hyperparams:
      length_scale: 1.0
      n_restarts: 1

ablation:
  feature_groups: [vix, gex]
  baseline: logistic_vix_only

report:
  output: report/_build/spy_vol_report.pdf
